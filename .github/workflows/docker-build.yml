name: Docker Multi-Architecture Build

on:
    push:
        paths-ignore:
            - "**.md"
        branches:
            - main
    workflow_dispatch:

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      runner: ubuntu-latest
                    - arch: arm64
                      runner: ubuntu-24.04-arm
        runs-on: ${{ matrix.runner }}
        steps:
            - uses: actions/checkout@v6
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
              with:
                  version: latest
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push per-arch image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/${{ matrix.arch }}
                  push: true
                  tags: logicalkarma/piped-proxy:latest-${{ matrix.arch }}
                  cache-from: type=gha,scope=${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

    manifest:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create -t logicalkarma/piped-proxy:latest \
                      logicalkarma/piped-proxy:latest-amd64 \
                      logicalkarma/piped-proxy:latest-arm64
